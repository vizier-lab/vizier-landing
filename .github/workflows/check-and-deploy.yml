name: Check Vizier Release and Deploy

on:
  schedule:
    # Run daily at 00:00 UTC (midnight)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  check-version:
    name: Check for new Vizier release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      has-update: ${{ steps.compare-versions.outputs.has-update }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch latest Vizier version
        id: get-version
        run: |
          RESPONSE=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            -H "User-Agent: vizier-landing-check" \
            https://api.github.com/repos/vizier-lab/vizier/releases/latest)
          
          VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' | sed 's/^v//')
          
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to fetch version from GitHub API"
            VERSION="unknown"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Fetched Vizier version: $VERSION"

      - name: Get stored version
        id: get-stored
        run: |
          if [ -f .vizier-version ]; then
            STORED=$(cat .vizier-version)
          else
            STORED="none"
          fi
          echo "stored=$STORED" >> $GITHUB_OUTPUT
          echo "Stored version: $STORED"

      - name: Compare versions
        id: compare-versions
        run: |
          LATEST="${{ steps.get-version.outputs.version }}"
          STORED="${{ steps.get-stored.outputs.stored }}"
          
          if [ "$LATEST" = "$STORED" ]; then
            echo "No version change detected"
            echo "has-update=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: $STORED -> $LATEST"
            echo "has-update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version file
        run: |
          echo "${{ steps.get-version.outputs.version }}" > .vizier-version

      - name: Commit and push version update
        if: steps.compare-versions.outputs.has-update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .vizier-version
          git commit -m "chore: update tracked vizier version to ${{ steps.get-version.outputs.version }}"
          git push

  trigger-deploy:
    name: Trigger landing page deployment
    needs: check-version
    if: needs.check-version.outputs.has-update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pages deployment
        run: |
          echo "🚀 Triggering landing page deployment for Vizier v${{ needs.check-version.outputs.version }}"

      - name: Dispatch to pages workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main'
            });

      - name: Log deployment trigger
        run: |
          echo "✓ Pages workflow dispatch triggered"
          echo "Version: ${{ needs.check-version.outputs.version }}"
