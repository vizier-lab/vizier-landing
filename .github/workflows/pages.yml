name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Vizier version
        id: version
        run: |
          version=$(curl -s https://api.github.com/repos/vizier-lab/vizier/releases/latest | grep '"tag_name"' | sed 's/.*: "\([^"]*\)".*/\1/' | sed 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Vizier version: $version"

      - name: Build
        env:
          NEXT_PUBLIC_VIZIER_VERSION: ${{ steps.version.outputs.version }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4